name: fetch-news
on:
  schedule:
    - cron: "17 22,4,10 * * *"   # KST 07:17 / 13:17 / 19:17 — 하루 3회
  workflow_dispatch: {}           # 수동 실행 버튼

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install feedparser
      - run: python scripts/fetch_news.py
      - name: commit
        run: |
          git config user.name "iapqb-bot"
          git config user.email "actions@github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "news: auto update"
          git push
